<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share the Ride – Hashtag Generator</title>
  <style>
    :root {
      --bg: #fff7d6;
      --card: #fffdf4;
      --text: #2b2b2b;
      --muted: #6b6b6b;
      --border: #efd86d;
      --primary: #f4c400;
      --primary-hover: #e0b300;
      --primary-strong: #c99700;
      --soft: #fff5cc;
      --success: #1f7a3d;
      --danger: #b42318;
      --chip: #fff0a6;
      --shadow: 0 12px 30px rgba(145, 108, 0, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, #fff9e8 100%);
      color: var(--text);
    }

    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow); overflow: hidden; }
    .hero { padding: 28px 24px 20px; background: linear-gradient(135deg, #fff6c8 0%, #fffdf2 55%, #fff2a8 100%); border-bottom: 1px solid var(--border); }
    h1 { margin: 0 0 8px; font-size: 1.9rem; line-height: 1.15; }
    .sub { margin: 0; color: var(--muted); line-height: 1.5; max-width: 860px; }
    .group-link { margin-top: 10px; }
    .group-link a { color: var(--primary-strong); font-weight: 800; text-decoration: none; overflow-wrap: anywhere; word-break: break-word; }
    .toolbar { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; margin-top: 18px; }

    .lang-switch {
      display: flex;
      flex-wrap: wrap;
      width: 100%;
      max-width: 100%;
      background: rgba(255,255,255,0.75);
      border: 1px solid var(--border);
      padding: 4px;
      border-radius: 20px;
      gap: 4px;
    }
    .lang-switch button {
      border: 0;
      background: transparent;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      color: var(--muted);
      flex: 1 1 calc(25% - 4px);
      min-width: 150px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .lang-switch button.active { background: var(--primary); color: #2b2b2b; }

    .content { padding: 24px; display: grid; gap: 20px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; align-items: start; }
    .full { grid-column: 1 / -1; }
    .field { display: grid; gap: 8px; }
    label { font-weight: 800; font-size: 0.97rem; }
    .hint, .footer-note { color: var(--muted); font-size: 0.9rem; line-height: 1.45; }
    .footer-note a { color: var(--primary-strong); font-weight: 700; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      color: var(--text);
      background: #fffdf7;
    }
    input:focus, select:focus, textarea:focus { outline: 2px solid rgba(244, 196, 0, 0.35); border-color: var(--primary-strong); }
    select[multiple] { min-height: 90px; padding: 10px; }
    textarea { resize: vertical; min-height: 110px; }

    .search-row { position: relative; }
    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fffdf7;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(145, 108, 0, 0.14);
      max-height: 260px;
      overflow-y: auto;
      z-index: 20;
      display: none;
    }
    .suggestions.visible { display: block; }
    .suggestion-item { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid rgba(239,216,109,0.45); background: #fffdf7; }
    .suggestion-item:last-child { border-bottom: 0; }
    .suggestion-item:hover { background: #fff3bf; }
    .suggestion-main { font-weight: 600; }
    .suggestion-sub { color: var(--muted); font-size: 0.88rem; margin-top: 2px; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; min-height: 12px; }
    .chip { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: var(--chip); border: 1px solid var(--border); font-size: 0.95rem; font-weight: 600; }
    .chip button { border: 0; background: transparent; color: var(--danger); cursor: pointer; font-weight: 800; padding: 0; line-height: 1; font-size: 1rem; }

    .actions { display: flex; flex-wrap: wrap; gap: 12px; }
    button.primary, button.secondary { border-radius: 14px; padding: 13px 18px; font: inherit; font-weight: 800; cursor: pointer; }
    button.primary { border: 1px solid var(--primary-strong); background: var(--primary); color: #2b2b2b; }
    button.secondary { background: var(--soft); color: #5c4700; border: 1px solid var(--border); }

    .tag-box { min-height: 182px; border: 1px solid var(--border); border-radius: 14px; padding: 14px; background: #fffdf7; display: grid; gap: 12px; align-content: start; }
    .tag-option { display: flex; align-items: flex-start; gap: 10px; line-height: 1.35; font-size: 0.98rem; font-weight: 400; }
    .tag-option input { width: 18px; height: 18px; margin-top: 2px; accent-color: var(--primary-strong); }
    .tag-hash { font-weight: 600; }

    .helper-preview { color: var(--muted); font-size: 0.92rem; line-height: 1.5; background: #fff9e8; border: 1px dashed var(--border); border-radius: 14px; padding: 12px 14px; }

    .date-picker-box { border: 1px solid var(--border); border-radius: 18px; background: #fffdf7; padding: 10px; display: grid; gap: 8px; width: 100%; }
    .date-picker-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .date-nav { border: 1px solid var(--border); background: var(--soft); color: #5c4700; border-radius: 10px; width: 34px; height: 34px; font: inherit; font-weight: 800; cursor: pointer; padding: 0; }
    .date-month-label { font-weight: 800; text-align: center; flex: 1; font-size: 0.98rem; }
    .date-weekdays, .date-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; grid-auto-rows: 34px; }
    .date-weekdays div { text-align: center; font-size: 0.76rem; color: var(--muted); font-weight: 700; padding: 2px 0; }
    .date-day, .date-empty { height: 34px; border-radius: 10px; }
    .date-empty { background: transparent; }
    .date-day { display:flex; align-items:center; justify-content:center; border: 1px solid rgba(239,216,109,0.6); background: #fffdf7; cursor: pointer; font: inherit; color: var(--text); }
    .date-day:hover { background: #fff3bf; }
    .date-day:disabled { opacity: 0.35; cursor: not-allowed; }
    .date-day.selected { background: var(--primary); border-color: var(--primary-strong); font-weight: 800; }

    .output { background: #fffdf7; border: 1px dashed var(--border); border-radius: 18px; padding: 18px; min-height: 140px; }
    .output-label { font-size: 0.92rem; font-weight: 800; margin-bottom: 10px; color: var(--muted); }
    #result { white-space: pre-wrap; line-height: 1.7; font-size: 1rem; word-break: break-word; }
    .success { color: var(--success); font-size: 0.92rem; font-weight: 700; min-height: 1.2em; }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.55rem; }
      .hero, .content { padding: 18px; }
      .lang-switch button { min-width: calc(50% - 4px); flex: 1 1 calc(50% - 4px); font-size: 0.95rem; }
      .date-day, .date-empty { height: 40px; }
      .date-weekdays, .date-grid { grid-auto-rows: 40px; }
    }
  .route-preview{display:none !important;}
#routePreview{display:none !important;}
.helper-preview{display:none !important;}
</style>
</head>

  <div class="wrap">

          <div class="footer-note" id="top-note"></div>
          <div class="footer-note" id="missingCityNote"></div>

      </div>

      <div class="content">
        <div class="grid">
          <div class="field">

          <div class="field">
            <label id="petTagLabel"></label>
            <div class="tag-box">

              <label class="tag-option" for="systematikaOption"><input type="checkbox" id="systematikaOption" value="Συστηματικά" /><span><span class="tag-hash" id="systematikaHashLabel">#Συστηματικά</span><br><span id="systematikaHint"></span></span></label>
            </div>
            <div class="hint" id="petTagHint"></div>
          </div>

          <div class="field full">
            <label for="originInput" id="originsLabel"></label>
            <div class="search-row"><input id="originInput" autocomplete="off" /><div class="suggestions" id="originSuggestions"></div></div>
            <div class="hint" id="originsHint"></div>
            <div class="chips" id="originsChips"></div>
          </div>

          <div class="field full">
            <label for="destinationInput" id="destinationsLabel"></label>
            <div class="search-row"><input id="destinationInput" autocomplete="off" /><div class="suggestions" id="destinationSuggestions"></div></div>
            <div class="hint" id="destinationsHint"></div>
            <div class="chips" id="destinationsChips"></div>
            <div class="helper-preview" id="routePreview"></div>
          </div>

          <div class="field full">
            <label for="stopsInput" id="stopsLabel"></label>
            <div class="search-row"><input id="stopsInput" autocomplete="off" /><div class="suggestions" id="stopsSuggestions"></div></div>
            <div class="hint" id="stopsHint"></div>
            <div class="chips" id="stopsChips"></div>
          </div>

          <div class="field full">
            <label id="datesLabel"></label>
            <div class="date-picker-box">
              <div class="date-picker-toolbar"><button class="date-nav" type="button" id="prevMonthBtn">‹</button><div class="date-month-label" id="dateMonthLabel"></div><button class="date-nav" type="button" id="nextMonthBtn">›</button></div>
              <div class="date-weekdays" id="dateWeekdays"></div>
              <div class="date-grid" id="dateGrid"></div>
            </div>
            <div class="actions"><button class="secondary" type="button" id="clearDatesBtn"></button></div>
            <div class="hint" id="datesHint"></div>
            <select id="dates" multiple></select>
          </div>
        </div>

        <div class="field full">
          <label for="messageBox" id="messageLabel"></label>
          <textarea id="messageBox" rows="4"></textarea>
          <div class="hint" id="messageHint"></div>
        </div>

        <div class="actions">
          <button class="primary" type="button" id="generateBtn"></button>
          <button class="secondary" type="button" id="copyBtn"></button>
          <button class="secondary" type="button" id="clearAllBtn"></button>
        </div>

        <div class="output"><div class="output-label" id="outputLabel"></div><div id="result"></div></div>
        <div class="success" id="successMsg"></div>
        <div class="footer-note" id="footerNote"></div>
      </div>
    </div>
  </div>

    function normalizeHashtagText(text) { return text.replace(/\s+/g,''); }
    function getParentLabel(parentName) { const parent = parentTranslations[parentName]; return parent ? (parent[lang] || parent.en || parent.el) : parentName; }
    function formatSuggestionLabel(city) { const display = city[lang] || city.en || city.el; return city.parent ? `${display} (${getParentLabel(city.parent)})` : display; }

    function getFilteredCities(query) {
      const clean = query.trim().toLowerCase();
      const seen = new Set();
      const source = clean ? cityOptions.filter(city => [city.el,city.en,city.de||'',city.fr||'',city.nl||'',city.parent||''].join(' ').toLowerCase().includes(clean)) : cityOptions;
      return source.filter(city => {
        const key = city.el + '|' + (city.parent || '');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      }).slice(0,12);
    }

    function hideSuggestions(group) {
      cityFields[group].suggestions.innerHTML = '';
      cityFields[group].suggestions.classList.remove('visible');
    }

    function updateRoutePreview() {
      const fromCities = selectedCities.origins.length ? selectedCities.origins.map(c => '#' + normalizeHashtagText(c)).join(' ') : '…';
      const toCities = selectedCities.destinations.length ? selectedCities.destinations.map(c => '#' + normalizeHashtagText(c)).join(' ') : '…';
      const viaCities = selectedCities.stops.length ? selectedCities.stops.map(c => '#' + normalizeHashtagText(c)).join(' ') : '…';
      routePreview.innerHTML = ` ${fromCities} → 🛬 ${toCities}<br>(📍 ${viaCities})`;
    }

    function renderCityChips(group) {
      const container = cityFields[group].chips;
      container.innerHTML = '';
      selectedCities[group].forEach(city => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerHTML = `<span>${city}</span><button type="button" aria-label="Remove">×</button>`;
        chip.querySelector('button').addEventListener('click', () => {
          selectedCities[group] = selectedCities[group].filter(item => item !== city);
          renderCityChips(group);
          updateRoutePreview();
        });
        container.appendChild(chip);
      });
    }

    function addMatchedCity(group, city) {
      if (!selectedCities[group].includes(city.el)) selectedCities[group].push(city.el);
      if (city.parent && !selectedCities[group].includes(city.parent)) selectedCities[group].push(city.parent);
      cityFields[group].input.value = '';
      renderCityChips(group);
      updateRoutePreview();
      hideSuggestions(group);
      successMsg.textContent = '';
      if (!result.textContent.trim() || Object.values(translationsData).some(tr => result.textContent === tr.noResult)) {
        result.textContent = translationsData[lang].noResult;
      }
    }

    function renderSuggestions(group, query) {
      const box = cityFields[group].suggestions;
      const matches = getFilteredCities(query);
      box.innerHTML = '';
      if (!matches.length) { box.classList.remove('visible'); return; }
      matches.forEach(city => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `<div class="suggestion-main">${formatSuggestionLabel(city)}</div>${city.parent ? `<div class="suggestion-sub">${translationsData[lang].parentAuto}</div>` : ''}`;
        item.addEventListener('mousedown', (event) => { event.preventDefault(); addMatchedCity(group, city); });
        box.appendChild(item);
      });
      box.classList.add('visible');
    }

    function getOptionalTags() {
      const tags = [];
      if (petOption.checked) tags.push('pet');
      if (systematikaOption.checked) tags.push('Συστηματικά');
      return tags;
    }

    function formatDateHashtag(isoDate) {
      const [year, month, day] = isoDate.split('-').map(Number);
      const d = new Date(year, month - 1, day);
      const weekday = weekdayGreek[d.getDay()];
      return weekday + String(day).padStart(2,'0') + String(month).padStart(2,'0') + String(year);
    }

    function formatIsoDate(year, monthIndex, day) { return `${year}-${String(monthIndex+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; }

    function renderDates() {
      datesSelect.innerHTML = '';
      datesState.forEach(value => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = '#' + formatDateHashtag(value);
        option.selected = true;
        datesSelect.appendChild(option);
      });
    }

    function toggleDate(isoDate) {
      if (isoDate < todayIso) return;
      const index = datesState.indexOf(isoDate);
      if (index === -1) { datesState.push(isoDate); datesState.sort(); }
      else { datesState.splice(index,1); }
      renderDates();
      renderCalendar();
      successMsg.textContent = '';
    }

    function renderCalendar() {
      const t = translationsData[lang] || translationsData.en;
      dateMonthLabel.textContent = `${t.months[calendarViewDate.getMonth()]} ${calendarViewDate.getFullYear()}`;
      dateWeekdays.innerHTML = t.weekdays.map(day => `<div>${day}</div>`).join('');
      const year = calendarViewDate.getFullYear();
      const monthIndex = calendarViewDate.getMonth();
      const firstDay = new Date(year, monthIndex, 1);
      const startOffset = (firstDay.getDay() + 6) % 7;
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      dateGrid.innerHTML = '';
      for (let i=0; i<startOffset; i++) {
        const empty = document.createElement('div');
        empty.className = 'date-empty';
        dateGrid.appendChild(empty);
      }
      for (let day=1; day<=daysInMonth; day++) {
        const isoDate = formatIsoDate(year, monthIndex, day);
        const isPast = isoDate < todayIso;
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'date-day' + (datesState.includes(isoDate) ? ' selected' : '');
        button.textContent = String(day);
        if (isPast) button.disabled = true;
        else button.addEventListener('click', () => toggleDate(isoDate));
        dateGrid.appendChild(button);
      }
    }

    function generateHashtags() {
      successMsg.textContent = '';
      const optional = getOptionalTags();
      if (!selectedCities.origins.length) { result.textContent = translationsData[lang].missingOrigin; return; }
      if (!selectedCities.destinations.length) { result.textContent = translationsData[lang].missingDestination; return; }
      if (!datesState.length && !optional.includes('Συστηματικά')) { result.textContent = translationsData[lang].missingDate; return; }
      const hashtags = [];
      rideTypeSelect.value.split(',').map(v => v.trim()).forEach(type => hashtags.push('#' + type));
      hashtags.push('🛫');
      selectedCities.origins.forEach(city=>hashtags.push('#'+normalizeHashtagText(city)));
      if (selectedCities.stops.length) {
        hashtags.push('(');
        hashtags.push('🔁');
        selectedCities.stops.forEach(city=>hashtags.push('#'+normalizeHashtagText(city)));
        hashtags.push(')');
      }
      hashtags.push('🛬');
      selectedCities.destinations.forEach(city=>hashtags.push('#'+normalizeHashtagText(city)));
      datesState.forEach(date=>hashtags.push('#'+formatDateHashtag(date)));
      optional.forEach(tag=>hashtags.push('#'+tag));(tag => hashtags.push('#' + tag));
      const unique = [...new Set(hashtags)];
      const message = messageBox.value.trim();
      result.textContent = message ? unique.join(' ') + '\n\n' + message : unique.join(' ');
    }

    async function copyResult() {
      const text = result.textContent.trim();
      if (!text || Object.values(translationsData).some(tr => text === tr.noResult)) return;
      try {
        await navigator.clipboard.writeText(text);
        successMsg.textContent = translationsData[lang].copied;
      } catch {
        successMsg.textContent = 'Copy failed.';
      }
    }

    function clearAll() {
      rideTypeSelect.selectedIndex = 0;
      petOption.checked = false;
      systematikaOption.checked = false;
      Object.keys(selectedCities).forEach(group => {
        selectedCities[group] = [];
        renderCityChips(group);
        cityFields[group].input.value = '';
        hideSuggestions(group);
      });
      datesState.length = 0;
      renderDates();
      renderCalendar();
      messageBox.value = '';
      successMsg.textContent = '';
      result.textContent = translationsData[lang].noResult;
      updateRoutePreview();
    }

    function setLanguage(newLang) {
      lang = newLang;
      ['el','en','de','fr','nl','it','es','pl'].forEach(code => {
        const button = document.getElementById('lang-' + code);
        if (button) button.classList.toggle('active', lang === code);
      });
      const t = translationsData[lang];
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('top-note').textContent = t.topNote;
      document.getElementById('missingCityNote').innerHTML = t.missingCityNote || '';
      document.getElementById('rideTypeLabel').textContent = t.rideTypeLabel;
      document.getElementById('rideTypeHint').textContent = t.rideTypeHint;
      document.getElementById('petTagLabel').textContent = t.petTagLabel;
      document.getElementById('petTagHint').textContent = t.petTagHint;
      document.getElementById('systematikaHint').textContent = t.systematikaHint;
      document.getElementById('petHint').textContent = t.petHint;
      document.getElementById('originsLabel').textContent = t.originsLabel;
      document.getElementById('originsHint').textContent = t.originsHint;
      document.getElementById('destinationsLabel').textContent = t.destinationsLabel;
      document.getElementById('destinationsHint').textContent = t.destinationsHint;
      document.getElementById('stopsLabel').textContent = t.stopsLabel;
      document.getElementById('stopsHint').textContent = t.stopsHint;
      document.getElementById('datesLabel').textContent = t.datesLabel;
      document.getElementById('datesHint').textContent = t.datesHint;
      document.getElementById('clearDatesBtn').textContent = t.clearDatesBtn;
      document.getElementById('generateBtn').textContent = t.generateBtn;
      document.getElementById('copyBtn').textContent = t.copyBtn;
      document.getElementById('clearAllBtn').textContent = t.clearAllBtn;
      document.getElementById('outputLabel').textContent = t.outputLabel;
      document.getElementById('footerNote').textContent = t.footerNote;
      document.getElementById('messageLabel').textContent = t.messageLabel;
      document.getElementById('messageHint').textContent = t.messageHint;
      messageBox.placeholder = t.messagePlaceholder;
      const rideOptions = rideOptionsByLang[lang] || rideOptionsByLang.en;
      Array.from(rideTypeSelect.options).forEach((option, i) => option.textContent = rideOptions[i]);
      updateRoutePreview();
      renderCalendar();
      if (!result.textContent.trim() || Object.values(translationsData).some(tr => result.textContent === tr.noResult)) {
        result.textContent = t.noResult;
      }
    }

    document.getElementById('lang-el').addEventListener('click', () => setLanguage('el'));
    document.getElementById('lang-en').addEventListener('click', () => setLanguage('en'));
    document.getElementById('lang-de').addEventListener('click', () => setLanguage('de'));
    document.getElementById('lang-fr').addEventListener('click', () => setLanguage('fr'));
    document.getElementById('lang-nl').addEventListener('click', () => setLanguage('nl'));
    document.getElementById('lang-it').addEventListener('click', () => setLanguage('it'));
    document.getElementById('lang-es').addEventListener('click', () => setLanguage('es'));
    document.getElementById('lang-pl').addEventListener('click', () => setLanguage('pl'));
    document.getElementById('clearDatesBtn').addEventListener('click', () => { datesState.length = 0; renderDates(); renderCalendar(); });
    document.getElementById('generateBtn').addEventListener('click', generateHashtags);
    document.getElementById('copyBtn').addEventListener('click', copyResult);
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);
    prevMonthBtn.addEventListener('click', () => { calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth()-1, 1); renderCalendar(); });
    nextMonthBtn.addEventListener('click', () => { calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth()+1, 1); renderCalendar(); });

    Object.entries(cityFields).forEach(([group, field]) => {
      field.input.addEventListener('input', () => renderSuggestions(group, field.input.value));
      field.input.addEventListener('focus', () => renderSuggestions(group, field.input.value));
      field.input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          const matches = getFilteredCities(field.input.value);
          if (matches.length) addMatchedCity(group, matches[0]);
        }
      });
      field.input.addEventListener('blur', () => setTimeout(() => hideSuggestions(group), 120));
    });

    document.addEventListener('click', (event) => {
      Object.entries(cityFields).forEach(([group, field]) => {
        if (!field.input.contains(event.target) && !field.suggestions.contains(event.target)) hideSuggestions(group);
      });
    });

    renderDates();
    updateRoutePreview();
    renderCalendar();
    setLanguage('el');
  </script>
</body>
</html>
